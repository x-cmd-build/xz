name: release

# Publish stage: tag a v* (or trigger manually) → GitHub Release with
# per-target tarball/zip + per-archive sha256 + top-level SHA256SUMS.
#
# Build matrix matches build-and-test.yml so a tag push produces a
# release in one shot.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl,  runner: ubuntu-latest,    os: linux,   libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux,   libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos,      runner: macos-latest,     os: macos }
          - { target: x86_64-macos,       runner: macos-latest,     os: macos }
          - { target: x86_64-windows,     runner: windows-latest,   os: windows }
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux gnu — only used by actions that shell out)
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install autoconf automake libtool

      - name: Install deps (Windows MSYS + autotools)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: >-
            git
            autoconf
            automake
            libtool
            make
            gcc
            gettext
            pkg-config
            autoconf-archive

      - name: Build on Alpine (musl)
        if: matrix.libc == 'musl'
        run: |
          docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w \
            alpine:3.20 sh -c '
            apk add --no-cache bash >/dev/null &&
            export BUILD_DIR=/tmp/build &&
            bash /w/scripts/build-alpine.sh &&
            XZ_BIN=/tmp/build/src/xz/xz bash /w/scripts/smoke.sh &&
            mkdir -p /w/build/src/xz &&
            cp /tmp/build/src/xz/xz /w/build/src/xz/xz
          '

      - name: Build (macOS — host arch = aarch64)
        if: matrix.os == 'macos' && matrix.target == 'aarch64-macos'
        run: bash scripts/build.sh && bash scripts/smoke.sh

      - name: Build (macOS x86_64 — cross-compile from arm64)
        if: matrix.target == 'x86_64-macos'
        run: bash scripts/build.sh && bash scripts/smoke.sh

      - name: Build (Windows x86_64 — MSYS bash)
        if: matrix.os == 'windows' && matrix.target == 'x86_64-windows'
        shell: msys2 {0}
        env:
          XZ_OS_HINT: msys
        run: bash scripts/build.sh

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows'
        run: TARGET=${{ matrix.target }} bash scripts/package.sh

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          TARGET: ${{ matrix.target }}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/package.ps1

      - name: Verify self-contained (macOS only)
        if: matrix.os == 'macos'
        run: |
          set -e
          bin="dist/xz-${{ matrix.target }}/bin/xz"
          otool -L "$bin"
          otool -L "$bin" | grep -E '/(opt/homebrew|usr/local)/' \
            && { echo "FAIL: $bin links Homebrew dylibs"; exit 1; } || true
          echo "OK: only system libs (/usr/lib, /System/Library)"

      - name: Show file type & size
        if: matrix.os != 'windows'
        run: |
          file dist/xz-${{ matrix.target }}/bin/xz
          du -h dist/xz-${{ matrix.target }}.tar.xz

      - name: Show file type & size (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $exe = "dist/xz-${{ matrix.target }}/bin/xz.exe"
          file $exe
          Get-ChildItem "dist/xz-${{ matrix.target }}.zip" | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
    # Windows deferred to v0.1.1 — see issues/1
    continue-on-error: ${{ matrix.target == 'x86_64-windows' || matrix.target == 'aarch64-windows' }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name '*.tar.xz' -o -name '*.zip' \) -print0 \
            | xargs -0 sha256sum | sed 's|^\([^ ]*\)  \./|\1  |' > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.xz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
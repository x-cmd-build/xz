name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl, runner: ubuntu-latest,    os: linux, libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux, libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos, runner: macos-latest, os: macos }
          - { target: x86_64-macos, runner: macos-latest, os: macos }
          - { target: x86_64-windows, runner: windows-latest, os: windows }
    steps:
      - run: echo "hello target=${{ matrix.target }} os=${{ matrix.os }} docker_arch=${{ matrix.docker_arch }}"
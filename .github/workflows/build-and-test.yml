name: build-and-test

# Auto-test stage: push / PR → builds all 5 targets, runs smoke, uploads
# artifacts. No release publish.
#
# Splits with `release.yml`:
#   - tag push / dispatch → release.yml (publish stage)
#
# Matrix matches ljh-sh/iperf: linux-musl x2 + macos x2 + windows x1.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl,  runner: ubuntu-latest,    os: linux,   libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux,   libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos,      runner: macos-latest,     os: macos }
          - { target: x86_64-macos,       runner: macos-latest,     os: macos }
          - { target: x86_64-windows,     runner: windows-latest,   os: windows }
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux gnu — only used by actions that shell out)
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install autoconf automake libtool

      - name: Install deps (Windows MSYS + autotools)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: >-
            git
            autoconf
            automake
            libtool
            make
            gcc
            gettext-devel
            pkg-config
            autoconf-archive

      - name: Build + smoke on Alpine (musl)
        if: matrix.libc == 'musl'
        run: |
          docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w \
            alpine:3.20 sh -c '
            apk add --no-cache bash >/dev/null &&
            export BUILD_DIR=/tmp/build &&
            bash /w/scripts/build-alpine.sh &&
            XZ_BIN=/tmp/build/src/xz/xz bash /w/scripts/smoke.sh &&
            mkdir -p /w/build/src/xz &&
            cp /tmp/build/src/xz/xz /w/build/src/xz/xz
          '

      - name: Copy xz binary out of docker for artifact
        if: matrix.libc == 'musl'
        run: mkdir -p build/src/xz && ls -la build/src/xz/ 2>/dev/null || true

      - name: Build (macOS — host arch = aarch64)
        if: matrix.os == 'macos' && matrix.target == 'aarch64-macos'
        run: bash scripts/build.sh && bash scripts/smoke.sh

      - name: Build (macOS x86_64 — cross-compile from arm64)
        if: matrix.target == 'x86_64-macos'
        run: bash scripts/build.sh && bash scripts/smoke.sh

      - name: Build (Windows x86_64 — MSYS bash)
        if: matrix.os == 'windows' && matrix.target == 'x86_64-windows'
        shell: msys2 {0}
        env:
          XZ_OS_HINT: msys
        run: bash scripts/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz-${{ matrix.target }}
          path: build/src/xz/xz
          if-no-files-found: warn
          retention-days: 7